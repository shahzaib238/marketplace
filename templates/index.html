<!DOCTYPE html>
<html>
<head>
    <title>Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: auto; }
        .item { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 10px; }
        .price { color: green; font-size: 22px; font-weight: bold; }
        button { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; }
    </style>
</head>
<body>
    <h1>🏪 Marketplace</h1>
    
    <h2>➕ Add Item</h2>
    <form id="sellForm">
        <input type="text" id="title" placeholder="Item name" required><br>
        <input type="number" id="price" placeholder="Price (Rs.)" required><br>
        <input type="text" id="location" placeholder="Location" required><br>
        <input type="text" id="phone" placeholder="Phone number" required><br>
        <textarea id="description" placeholder="Description"></textarea><br>
        <input type="text" id="seller_name" placeholder="Your name" required><br>
        <button type="submit">Post Item</button>
    </form>

    <h2>🛍️ Items for Sale</h2>
    <div id="listings"></div>

    <script>
        async function loadListings() {
            const res = await fetch('/api/listings');
            const items = await res.json();
            const container = document.getElementById('listings');
            container.innerHTML = items.map(item => `
                <div class="item">
                    <strong>${item.title}</strong><br>
                    <span class="price">Rs. ${item.price}</span><br>
                    📍 ${item.location}<br>
                    📞 ${item.phone}<br>
                    ${item.description}<br>
                    <small>Posted by ${item.seller_name}</small>
                </div>
            `).join('');
        }

        document.getElementById('sellForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            await fetch('/add-item', { method: 'POST', body: formData });
            e.target.reset();
            loadListings();
        };

        loadListings();
    </script>
</body>
</html>

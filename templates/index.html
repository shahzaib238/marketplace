<!DOCTYPE html>
<html>
<head>
    <title>Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: auto; background: #f5f5f5; }
        h1 { color: #333; }
        .form-container, .listings-container { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .price { color: #2ecc71; font-size: 20px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .success { color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🏪 Local Marketplace</h1>
    
    <div class="form-container">
        <h2>📦 Sell an Item</h2>
        <form id="sellForm">
            <input type="text" id="title" placeholder="Item name" required>
            <input type="number" id="price" placeholder="Price (Rs.)" required>
            <input type="text" id="location" placeholder="Location (e.g., Karachi, Lahore)" required>
            <input type="text" id="phone" placeholder="Phone number" required>
            <textarea id="description" placeholder="Description" rows="3"></textarea>
            <input type="text" id="seller_name" placeholder="Your name" required>
            <button type="submit">Post Listing</button>
        </form>
        <div id="message" class="success"></div>
    </div>

    <div class="listings-container">
        <h2>🛍️ Items for Sale</h2>
        <div id="listings">Loading...</div>
    </div>

    <script>
        async function loadListings() {
            try {
                const res = await fetch('/api/listings');
                const items = await res.json();
                const container = document.getElementById('listings');
                if (items.length === 0) {
                    container.innerHTML = '<p>No items yet. Be the first to sell!</p>';
                    return;
                }
                container.innerHTML = items.map(item => `
                    <div class="item">
                        <strong style="font-size: 18px;">${escapeHtml(item.title)}</strong><br>
                        <span class="price">Rs. ${item.price.toLocaleString()}</span><br>
                        📍 ${escapeHtml(item.location)}<br>
                        📞 ${escapeHtml(item.phone)}<br>
                        📝 ${escapeHtml(item.description || 'No description')}<br>
                        <small>Posted by ${escapeHtml(item.seller_name)} on ${new Date(item.created_at).toLocaleString()}</small>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('listings').innerHTML = '<p>Error loading items</p>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('sellForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const res = await fetch('/add-item', { method: 'POST', body: formData });
                if (res.ok) {
                    document.getElementById('message').innerHTML = '✅ Item posted successfully!';
                    e.target.reset();
                    loadListings();
                    setTimeout(() => {
                        document.getElementById('message').innerHTML = '';
                    }, 3000);
                } else {
                    document.getElementById('message').innerHTML = '❌ Error posting item';
                }
            } catch (err) {
                document.getElementById('message').innerHTML = '❌ Error posting item';
            }
        };

        loadListings();
    </script>
</body>
</html>
